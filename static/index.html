<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Podcast - 24/7 不间断AI新闻播客</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">AI News Podcast</h1>
                <span class="badge badge-live">LIVE</span>
            </div>

            <!-- 播放器 -->
            <div class="player-card">
                <div class="player-visualizer" id="visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    <div class="bar"></div><div class="bar"></div>
                </div>
                <div class="player-info">
                    <div class="player-title" id="playerTitle">等待播放...</div>
                    <div class="player-source" id="playerSource"></div>
                </div>
                <div class="player-controls">
                    <button class="btn-control" id="btnPlay" title="播放/暂停">
                        <span id="playIcon">▶</span>
                    </button>
                    <div class="volume-control">
                        <input type="range" id="volumeSlider" min="0" max="100" value="80" title="音量">
                    </div>
                </div>
                <div class="player-status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">已就绪</span>
                </div>
            </div>

            <!-- 流水线状态 -->
            <div class="pipeline-status">
                <h3>系统状态</h3>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="label">新闻库存</span>
                        <span class="value" id="newsCount">--</span>
                    </div>
                    <div class="status-item">
                        <span class="label">今日采集</span>
                        <span class="value" id="todayCount">--</span>
                    </div>
                    <div class="status-item">
                        <span class="label">队列长度</span>
                        <span class="value" id="queueLength">--</span>
                    </div>
                    <div class="status-item">
                        <span class="label">监听数</span>
                        <span class="value" id="listenerCount">0</span>
                    </div>
                </div>
                <button class="btn btn-trigger" id="btnTrigger" title="手动触发新闻采集">立即采集</button>
            </div>

            <div class="sidebar-footer">
                <span>AI News Podcast Agent v0.1.0</span>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="top-bar">
                <div class="tabs">
                    <button class="tab active" data-tab="news">新闻列表</button>
                    <button class="tab" data-tab="podcasts">播客历史</button>
                    <button class="tab" data-tab="playlists">播单</button>
                    <button class="tab" data-tab="sources">新闻源管理</button>
                </div>
                <div class="top-actions">
                    <select id="sourceFilter" class="filter-select">
                        <option value="">全部来源</option>
                    </select>
                    <select id="scoreFilter" class="filter-select">
                        <option value="0">全部评分</option>
                        <option value="7">≥ 7分</option>
                        <option value="5">≥ 5分</option>
                    </select>
                </div>
            </div>

            <!-- 新闻列表 -->
            <div class="tab-content active" id="tab-news">
                <div class="news-list" id="newsList">
                    <div class="empty-state">加载中...</div>
                </div>
                <div class="pagination" id="newsPagination"></div>
            </div>

            <!-- 播客历史 -->
            <div class="tab-content" id="tab-podcasts">
                <div class="podcast-list" id="podcastList">
                    <div class="empty-state">暂无播客</div>
                </div>
            </div>

            <!-- 新闻源管理 -->
            <div class="tab-content" id="tab-sources">
                <div class="sources-panel">
                    <div class="source-form">
                        <h3>添加新闻源</h3>
                        <div class="form-row">
                            <input type="text" id="srcName" placeholder="源名称（如：机器之心）" class="form-input">
                            <select id="srcType" class="form-select">
                                <option value="rss">RSS</option>
                                <option value="web">网页爬虫</option>
                            </select>
                            <select id="srcLang" class="form-select">
                                <option value="zh">中文</option>
                                <option value="en">英文</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <input type="text" id="srcUrl" placeholder="URL（如：https://example.com/rss）" class="form-input full-width">
                        </div>
                        <div class="form-row">
                            <input type="text" id="srcKeywords" placeholder="关键词（逗号分隔，可选）" class="form-input full-width">
                        </div>
                        <button class="btn btn-trigger" id="btnAddSource">添加源</button>
                    </div>
                    <div class="source-list" id="sourceList">
                        <div class="empty-state">加载中...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <audio id="audioPlayer" preload="none"></audio>
    <script src="/static/app.js"></script>
</body>
</html>
