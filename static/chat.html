<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Podcast — AI News Podcast</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  .chat-app { display:flex; height:100vh; }
  .chat-main { flex:1; display:flex; flex-direction:column; max-width:900px; margin:0 auto; width:100%; }
  .chat-header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .chat-header .back { color:var(--text-muted); text-decoration:none; font-size:13px; }
  .chat-header .back:hover { color:var(--accent); }
  .chat-header h2 { font-size:16px; font-weight:600; }
  .chat-messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px; }
  .chat-msg { max-width:85%; padding:14px 18px; border-radius:12px; line-height:1.7; font-size:14px; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .chat-msg.user { align-self:flex-end; background:var(--accent-dim); color:var(--text-primary); border-bottom-right-radius:4px; }
  .chat-msg.bot { align-self:flex-start; background:var(--bg-card); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .chat-msg.bot.podcast { border-color:var(--accent); }
  .chat-msg .msg-script { font-size:13px; color:var(--text-secondary); white-space:pre-line; margin-bottom:10px; max-height:200px; overflow-y:auto; }
  .chat-msg .msg-sources { font-size:11px; color:var(--text-muted); margin-top:8px; }
  .chat-msg .msg-sources span { display:inline-block; margin-right:8px; }
  .chat-input-wrap { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:8px; }
  .chat-input-wrap input { flex:1; padding:10px 16px; font-size:14px; border:1px solid var(--border); border-radius:24px; background:var(--bg-card); color:var(--text-primary); outline:none; }
  .chat-input-wrap input:focus { border-color:var(--accent); }
  .chat-input-wrap button { padding:10px 20px; border-radius:24px; border:none; background:var(--accent); color:#000; font-weight:600; cursor:pointer; font-size:14px; }
  .chat-input-wrap button:disabled { opacity:0.5; cursor:not-allowed; }
  .chat-hints { font-size:12px; color:var(--text-muted); padding:0 24px 8px; display:flex; gap:8px; flex-wrap:wrap; }
  .chat-hints .hint { padding:4px 12px; border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:border-color 0.2s; }
  .chat-hints .hint:hover { border-color:var(--accent); }
  .typing { display:flex; gap:4px; padding:14px 18px; }
  .typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay:0.2s; }
  .typing span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6)} 40%{transform:scale(1)} }
</style>
</head>
<body>
<div class="chat-app">
  <div class="chat-main">
    <div class="chat-header">
      <a href="/" class="back">← 24h 主页</a>
      <h2>Custom Podcast</h2>
      <span style="font-size:12px;color:var(--text-muted);margin-left:auto">AI 定制播客 & 新闻问答</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg bot">
        你好！我可以帮你：<br>
        🎙️ <b>生成定制播客</b> — 试试 "帮我生成3条关于AI芯片的新闻播客"<br>
        💬 <b>新闻问答</b> — 试试 "最近有什么AI大事件？"
      </div>
    </div>
    <div class="chat-hints" id="chatHints">
      <span class="hint" onclick="sendHint(this)">今天有什么AI大新闻？</span>
      <span class="hint" onclick="sendHint(this)">帮我生成关于自动驾驶的播客</span>
      <span class="hint" onclick="sendHint(this)">上周AI行业有什么大事？</span>
      <span class="hint" onclick="sendHint(this)">介绍一下GPT的最新进展</span>
    </div>
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" placeholder="输入消息，我会自动判断意图..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button id="chatSendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>
<audio id="customAudio" preload="none" style="display:none"></audio>
<script>
const $ = s => document.querySelector(s);
const API = '';

function addMessage(type, content, extra) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + type + (extra?.podcast ? ' podcast' : '');
  let html = '';
  if (extra?.podcast) {
    html += `<div style="font-weight:600;margin-bottom:6px;color:var(--accent)">🎙️ 定制播客 · ${esc(extra.topic||'AI新闻')}</div>`;
    html += `<div class="msg-script">${esc(extra.script||'')}</div>`;
    if (extra.audio_url) {
      html += `<button class="btn" onclick="playPodcast('${escAttr(extra.audio_url)}',this)" style="margin-right:8px;">▶ 播放</button>`;
    }
    html += `<div class="msg-sources">📰 参考 ${extra.source_count||0} 条新闻</div>`;
  } else {
    html += `<div>${content.replace(/\n/g,'<br>')}</div>`;
    if (extra?.sources) {
      html += `<div class="msg-sources">📰 ` + extra.sources.map(s => `<span>${esc(s.title)}</span>`).join('') + `</div>`;
    }
  }
  div.innerHTML = html;
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function sendHint(el) {
  document.getElementById('chatInput').value = el.textContent;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const msg = input.value.trim();
  if (!msg) return;

  addMessage('user', msg);
  input.value = '';
  btn.disabled = true;
  addTyping();

  try {
    const r = await fetch(API + '/api/chat/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const d = await r.json();
    removeTyping();

    if (d.type === 'podcast') {
      addMessage('bot', '', {podcast:true, script:d.script, audio_url:d.audio_url, topic:d.topic, source_count:d.source_count});
    } else if (d.type === 'text') {
      addMessage('bot', d.content, {sources:d.sources});
    } else {
      addMessage('bot', d.content || '出错了');
    }
  } catch(e) {
    removeTyping();
    addMessage('bot', '网络错误，请稍后重试');
  }
  btn.disabled = false;
}

function playPodcast(url, btn) {
  const audio = document.getElementById('customAudio');
  audio.src = API + url;
  audio.load();
  audio.play().then(() => {
    btn.textContent = '⏸ 暂停';
    btn.onclick = () => { audio.pause(); btn.textContent = '▶ 播放'; btn.onclick = () => playPodcast(url, btn); };
  }).catch(() => { btn.textContent = '❌ 失败'; });
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
